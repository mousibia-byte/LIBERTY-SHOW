name: 🎬 Build Liberty Show APK (Debug)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ────────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Verify Web Assets (pre-bundled in repo) ───────────────
      - name: 📂 Verify Web Assets
        run: |
          echo "--- Web assets bundled in repo:"
          find app/src/main/assets -type f
          echo "✅ Assets ready."

      # ── 5. Setup Gradle ───────────────────────────────────────────
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # ── 6. Make gradlew executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 7. Build Debug APK ────────────────────────────────────────
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"

      # ── 8. Rename APK ────────────────────────────────────────────
      - name: 📝 Rename APK files
        run: |
          # Rename with version info
          find app/build/outputs/apk -name "*.apk" | while read f; do
            dir=$(dirname "$f")
            name=$(basename "$f" .apk)
            mv "$f" "$dir/LibertyShow-v1.0-$(date +%Y%m%d)-${name}.apk" 2>/dev/null || true
          done
          echo "APK files:"
          find app/build/outputs/apk -name "*.apk"

      # ── 9. Upload Debug APK ──────────────────────────────────────
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LibertyShow-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
